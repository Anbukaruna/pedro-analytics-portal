<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>PDS Operations Dashboard &mdash; Pedro Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root { --color-black:#000; --color-white:#fff; --color-tan:#B09E85; --font-display:'Cormorant Garamond',Georgia,serif; --font-body:'Inter',-apple-system,sans-serif; --header-height:56px; --transition-fast:150ms ease; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;height:-webkit-fill-available;overflow:hidden;background:#111;}
    a{text-decoration:none;color:inherit;}

    .report-header {
      position:fixed;top:0;left:0;right:0;
      height:var(--header-height);
      background:var(--color-black);
      border-bottom:1px solid #1a1a1a;
      z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;
      padding-top:env(safe-area-inset-top);
      height:calc(var(--header-height) + env(safe-area-inset-top));
    }
    .back-link {
      display:flex;align-items:center;gap:8px;
      font-family:var(--font-body);font-weight:300;font-size:10px;
      letter-spacing:0.18em;text-transform:uppercase;
      color:rgba(255,255,255,0.5);min-width:100px;min-height:44px;
      touch-action:manipulation;-webkit-tap-highlight-color:transparent;
      transition:color var(--transition-fast);
    }
    .back-link:hover{color:var(--color-tan);}
    .report-title {
      font-family:var(--font-display);font-weight:400;font-size:14px;
      letter-spacing:0.2em;text-transform:uppercase;
      color:var(--color-white);text-align:center;flex:1;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px;
    }
    .header-brand {
      min-width:100px;text-align:right;
      font-family:var(--font-body);font-weight:300;font-size:9px;
      letter-spacing:0.2em;text-transform:uppercase;color:var(--color-tan);
    }
    .report-container{
      position:fixed;
      top:calc(var(--header-height) + env(safe-area-inset-top));
      left:env(safe-area-inset-left);right:env(safe-area-inset-right);
      bottom:env(safe-area-inset-bottom);
    }
    .report-container iframe{width:100%;height:100%;border:none;display:block;}
    @media(max-width:600px){
      .report-title{font-size:12px;letter-spacing:0.12em;}
      .header-brand{display:none;}
      .back-link span:not(:first-child){display:none;}
      .back-link{min-width:44px;}
    }
    @media(max-width:380px){.report-title{font-size:10px;letter-spacing:0.08em;}}
  </style>
</head>
<body>
  <header class="report-header">
    <a href="pedro-home.html" class="back-link">
      <span style="font-size:14px">←</span>
      <span>Pedro</span>
    </a>
    <h1 class="report-title">PDS Operations Dashboard</h1>
    <span class="header-brand">Pedro &mdash; Report 07</span>
  </header>
  <main class="report-container">
    <!-- PDS Operations Dashboard - Power BI -->
    <iframe
      src="https://app.powerbi.com/reportEmbed?reportId=6266b134-1e37-42ea-913f-2642a08c0178&appId=15f9b98b-148c-4874-9d5c-2e0e309c594e&autoAuth=true&ctid=91102694-da46-42b1-8eab-608c2550e73b&actionBarEnabled=true&reportCopilotInEmbed=true"
      frameborder="0"
      allowFullScreen="true"
      title="PDS Operations Dashboard — Power BI">
    </iframe>
  </main>
</body>
</html>
